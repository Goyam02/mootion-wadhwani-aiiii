version: "3.9"

services:
  frontend:
    build:
      context: ./frontend

    container_name: frontend

    expose:
      - "5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: unless-stopped

  bloop-backend:
    build:
      context: ./bloop-core

    container_name: bloop-backend

    expose:
      - "8000"

    restart: unless-stopped

  manim-engine:
    build:
      context: ./animation-engine

    container_name: manim-engine

    expose:
      - "8001"

    volumes:
      - ./animation-engine:/app

    restart: unless-stopped

  nginx:
    image: nginx:latest

    container_name: nginx

    depends_on:
      - frontend
      - bloop-backend
      - manim-engine

    ports:
      - "1313:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    restart: unless-stopped